syntax = "proto3";

package todo;

import "google/protobuf/empty.proto";

enum Status {
  TO_DO = 0;
  IN_PROGRESS = 1;
  DONE = 2;
}

message Todo {
  int32 id = 1;
  string title = 2;
  optional string description = 3;
  Status status = 4;
}

message TodoId {
  int32 id = 1;
}

message TodoList {
  repeated Todo todos = 1;
}

service TodoService {
  rpc CreateTodo(Todo) returns (Todo);
  rpc GetTodo(TodoId) returns (Todo);
  rpc ListTodos(google.protobuf.Empty) returns (TodoList);
  rpc UpdateTodo(Todo) returns (Todo);
  rpc DeleteTodo(TodoId) returns (google.protobuf.Empty);
}
